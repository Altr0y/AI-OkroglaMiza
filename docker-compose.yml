services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: ai_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    env_file:
      - .env
    environment:
      - PORT=5000
    restart: unless-stopped

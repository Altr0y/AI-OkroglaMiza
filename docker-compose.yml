services:
  backend_auth:
    build:
      context: ./backend_auth
      dockerfile: Dockerfile
    develop:
      watch:
        - path: ./backend_auth
          action: rebuild
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
    restart: unless-stopped

  ai_backend:
    build: 
      context: ./backend_ai
      dockerfile: Dockerfile 
    develop:
      watch:
        - path: ./backend_ai
          action: rebuild    
    container_name: backend_ai
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    
  ollama:
      image: ollama/ollama
      container_name: ollama
      ports:
        - "11434:11434"
      volumes:
        - ./ollama_data:/root/.ollama
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
                

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    develop:
      watch:
        - path: ./frontend
          action: rebuild
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_AUTH_URL=http://localhost:5000
    depends_on:
      - ai_backend
      - backend_auth
    restart: unless-stopped
